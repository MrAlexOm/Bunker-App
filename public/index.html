<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="BUNKER - Офлайн приложение для выживания">
    <title>BUNKER</title>
    <link rel="icon" href="./favicon.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            color: #ffffff;
        }
        #root {
            width: 100vw;
            height: 100vh;
            overflow-x: hidden;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #FF4500;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading">Загрузка BUNKER...</div>
    </div>
    <script>
        // Handle relative paths for Netlify
        window.__EXPO_BASE_URL__ = './';
        
        // Error handling
        window.addEventListener('error', function(e) {
            console.error('BUNKER Error:', e.error);
            console.error("CRITICAL ERROR:", e.error);
            console.error("Error details:", {
                message: e.error?.message,
                stack: e.error?.stack,
                filename: e.filename,
                lineno: e.lineno,
                colno: e.colno
            });
            
            // Show real error on screen instead of generic message
            const errorText = e.error?.toString() || 'Unknown error occurred';
            const errorMessage = e.error?.message || 'No message available';
            const errorStack = e.error?.stack?.split('\n')[0] || 'No stack trace';
            
            document.getElementById('root').innerHTML = `
                <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #0B0B0B; color: #FF3B30; font-family: Arial, sans-serif; text-align: center; padding: 20px;">
                    <div>
                        <h2 style="color: #FF3B30; margin-bottom: 20px;">ERROR: ${errorText}</h2>
                        <p style="color: #FFFFFF; margin-bottom: 10px;">Type: ${e.error?.constructor?.name || 'Unknown'}</p>
                        <p style="color: #CCCCCC; margin-bottom: 10px;">Message: ${errorMessage}</p>
                        <p style="color: #CCCCCC; margin-bottom: 10px;">File: ${e.filename}:${e.lineno}:${e.colno}</p>
                        <p style="color: #CCCCCC; font-size: 12px;">Stack: ${errorStack}</p>
                    </div>
                </div>
            `;
        });

        // Unhandled promise rejection handler
        window.addEventListener('unhandledrejection', function(e) {
            console.error('BUNKER Unhandled Promise Rejection:', e.reason);
            console.error("CRITICAL PROMISE ERROR:", e.reason);
            console.error("Promise details:", {
                reason: e.reason,
                promise: e.promise
            });
            
            // Show real promise error on screen
            const errorText = e.reason?.toString() || 'Unknown promise rejection';
            const errorMessage = e.reason?.message || 'No message available';
            
            document.getElementById('root').innerHTML = `
                <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #0B0B0B; color: #FF3B30; font-family: Arial, sans-serif; text-align: center; padding: 20px;">
                    <div>
                        <h2 style="color: #FF3B30; margin-bottom: 20px;">PROMISE ERROR: ${errorText}</h2>
                        <p style="color: #FFFFFF; margin-bottom: 10px;">Type: Promise Rejection</p>
                        <p style="color: #CCCCCC; margin-bottom: 10px;">Message: ${errorMessage}</p>
                        <p style="color: #CCCCCC; font-size: 12px;">Reason: ${JSON.stringify(e.reason, null, 2)}</p>
                    </div>
                </div>
            `;
        });
        
        // Console log for debugging
        console.log('BUNKER Web App Loading...');
    </script>
</body>
</html>
